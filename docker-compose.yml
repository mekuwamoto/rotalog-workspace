version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: rotalog-db
    environment:
      POSTGRES_USER: rotalog_admin
      POSTGRES_PASSWORD: rotalog123
      POSTGRES_DB: rotalog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./tools/scripts/init-schemas.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./tools/scripts/02-migration-frotas.sql:/docker-entrypoint-initdb.d/02-migration-frotas.sql
      - ./tools/scripts/03-migration-entregas.sql:/docker-entrypoint-initdb.d/03-migration-entregas.sql
      - ./tools/scripts/04-migration-notificacoes.sql:/docker-entrypoint-initdb.d/04-migration-notificacoes.sql
      - ./tools/scripts/05-seed-frotas.sql:/docker-entrypoint-initdb.d/05-seed-frotas.sql
      - ./tools/scripts/06-seed-entregas.sql:/docker-entrypoint-initdb.d/06-seed-entregas.sql
      - ./tools/scripts/07-seed-notificacoes.sql:/docker-entrypoint-initdb.d/07-seed-notificacoes.sql
      - ./tools/scripts/08-add-motorista-veiculo-info.sql:/docker-entrypoint-initdb.d/08-add-motorista-veiculo-info.sql
    networks:
      - rotalog-network
    # TODO: Add health checks
    # TODO: Add resource limits
    # TODO: Add backup strategy

  api-notificacoes:
    build:
      context: ../rotalog-api-notificacoes
      dockerfile: Dockerfile
    container_name: rotalog-api-notificacoes
    ports:
      - "5000:5000"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=rotalog;Username=rotalog_admin;Password=rotalog123"
      ApiKey: "rotalog-api-key"
      ExternalServices__ApiFrotasUrl: "http://api-frotas:8080"
      ExternalServices__ApiEntregasUrl: "http://api-entregas:3000"
      ASPNETCORE_ENVIRONMENT: "Production"
    depends_on:
      - postgres
    networks:
      - rotalog-network

  # TODO: Add Redis service
  # TODO: Add Kafka service
  # TODO: Add Elasticsearch service
  # TODO: Add Prometheus service
  # TODO: Add Grafana service

volumes:
  pgdata:

networks:
  rotalog-network:
    driver: bridge

